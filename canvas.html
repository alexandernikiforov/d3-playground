<!DOCTYPE html>
<head>
    <title>D3 Playground (Canvas)</title>
</head>
<body>
<div id="canvas"></div>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const container = document.querySelector("#canvas");
    const devicePixelRatio = window.devicePixelRatio;

    const canvas = d3.select(container)
        .append("canvas")
        .style("border", "1px solid black")
        .style("max-width", "100%");

    const setCanvasSize = () => {
        const width = container.offsetWidth;
        const height = 0.333 * width;

        canvas
            .attr("width", width * devicePixelRatio)
            .attr("height", height * devicePixelRatio);
    };

    setCanvasSize();
    window.addEventListener("resize", setCanvasSize);

    const context = canvas.node().getContext("2d");
    context.scale(devicePixelRatio, devicePixelRatio);

    // now draw
    context.beginPath();
    context.moveTo(66, 60);
    context.lineTo(186, 300);
    context.stroke();

    context.rect(346, 33, 160, 80);
    context.fillStyle = "#6ba5d7";
    context.fill();

    context.rect(346, 33, 160, 80);
    context.roundRect(346, 133, 160, 80, [20]);
    context.fillStyle = "#6ba5d7";
    context.fill();

    context.beginPath();
    context.rect(346, 233, 106, 80);
    context.strokeStyle = "#6ba5d7";
    context.stroke();

</script>
</body>
