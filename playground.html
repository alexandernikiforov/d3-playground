<!DOCTYPE html>
<head>
    <title>D3 Playground</title>
</head>
<body>
<div id="container"></div>
<script type="module">

    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const matrix = [
        [11975, 5871, 8916, 2868],
        [1951, 10048, 2060, 6171],
        [8010, 16145, 8090, 8045],
        [1013, 990, 940, 6907]
    ];

    d3.select("body")
        .append("table")
        .attr("style", "min-width: 80%")
        .selectAll("tr")
        .data(matrix)
        .join("tr")
        .selectAll("td")
        .data(d => d)
        .join("td")
        .text(d => d);

    d3.select("body")
        .append("ul")
        .selectAll("li")
        .data(["a", "b"])
        .join("li")
        .text(d => d);
</script>
</body>
